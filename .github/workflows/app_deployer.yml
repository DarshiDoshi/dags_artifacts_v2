name: Deploy NX1 App (via Template)

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  deploy:
    uses: nexuscognitive/global_ci_template/.github/workflows/app_deployer.yml@main

    with:
      app_name: kf_demo_app
    secrets:
      NX1_API_KEY: ${{ secrets.NX1_API_KEY }}
      NX1_HOST: ${{ secrets.NX1_HOST }}
